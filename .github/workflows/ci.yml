name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install . pytest
      - name: Run tests
        run: python -m pytest tests/ -q
      - name: Smoke - console script exists
        run: kbd-signal --help
      - name: Smoke - hook path is a safe no-op without a keyboard
        shell: pwsh
        run: |
          '{"hook_event_name":"Stop","session_id":"ci"}' | kbd-signal hook claude
          if ($LASTEXITCODE -ne 0) { throw "hook must exit 0 without a keyboard" }
      - name: Smoke - detect reports missing device cleanly (exit 1)
        shell: pwsh
        run: |
          $out = kbd-signal detect 2>&1
          if ($LASTEXITCODE -ne 1) { throw "detect should exit 1 on CI (no keyboard), got $LASTEXITCODE" }
          if ("$out" -match "Traceback") { throw "detect must not leak a traceback" }

  install-from-pypi:
    # Verifies the real end-user path against the latest published release
    if: github.ref == 'refs/heads/main'
    runs-on: windows-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install pipx
      - run: pipx install kbd-signal
      - run: kbd-signal --help
