name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-latest exercises the POSIX code path (fcntl lock, XDG state
        # dir) cheaply across all Python versions. macos-latest is added as a
        # single cell below (via include): it is the only runner that actually
        # runs the sys.platform=="darwin" branch — the ~/Library state dir, the
        # IOKit hidapi wheel import, and the start_new_session detach. No test
        # touches native HID (the keyboard is mocked).
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]
        include:
          # One macOS cell only: a full 3-Python macOS matrix costs ~5x runner
          # minutes for no extra coverage (the darwin branch is version-agnostic).
          - os: macos-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install hidapi build/runtime deps (Linux)
        if: runner.os == 'Linux'
        # Covers both paths: runtime lib for the manylinux wheel, dev headers
        # for an sdist fallback build if a wheel is ever missing.
        run: |
          sudo apt-get update
          sudo apt-get install -y libhidapi-hidraw0 libusb-1.0-0-dev libudev-dev
      - name: Install package
        run: python -m pip install . pytest
      - name: Run tests
        run: python -m pytest tests/ -q
      - name: Smoke - console script exists
        run: kbd-signal --help
      - name: Smoke - hook path is a safe no-op without a keyboard
        shell: pwsh
        run: |
          '{"hook_event_name":"Stop","session_id":"ci"}' | kbd-signal hook claude
          if ($LASTEXITCODE -ne 0) { throw "hook must exit 0 without a keyboard" }
      - name: Smoke - detect reports missing device cleanly (exit 1)
        shell: pwsh
        run: |
          $out = kbd-signal detect 2>&1
          if ($LASTEXITCODE -ne 1) { throw "detect should exit 1 on CI (no keyboard), got $LASTEXITCODE" }
          if ("$out" -match "Traceback") { throw "detect must not leak a traceback" }
          exit 0  # the step must not inherit detect's expected exit 1

  install-from-pypi:
    # Verifies the real end-user path against the latest published release
    if: github.ref == 'refs/heads/main'
    runs-on: windows-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install pipx
      - run: pipx install kbd-signal
      - run: kbd-signal --help
